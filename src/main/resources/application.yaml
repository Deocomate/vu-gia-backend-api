spring:
  application:
    name: vu-gia
  servlet:
    multipart:
      max-file-size: 10MB         # mỗi file tối đa 10MB
      max-request-size: 100MB     # tổng 1 request
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/db_vu_gia_fullstack?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway là nguồn chân lý của schema; Hibernate chỉ kiểm tra khớp (không tự sửa DB).
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        # Ghi/đọc cột DATETIME theo giờ Việt Nam (GMT+7) thay vì UTC mặc định.
        # Instant sẽ được quy đổi sang wall-clock Asia/Ho_Chi_Minh khi lưu vào DB.
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  # Jackson tuần tự hoá thời gian theo giờ Việt Nam trong JSON response.
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  flyway:
    enabled: true
    # Chạy schema (db/migration) trước, rồi seed (db/seed) theo thứ tự version.
    locations: classpath:db/migration,classpath:db/seed
    # DB đã có sẵn bảng (chưa có lịch sử Flyway) sẽ được baseline ở version 1
    # (bỏ qua V1 để KHÔNG drop/xoá dữ liệu hiện có); chỉ chạy seed V2 trở đi.
    baseline-on-migrate: true
    baseline-version: 1
  mail:
    port: 465
    host: ${MAIL_HOST:smtp.gmail.com}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        SMTP:
          auth: true
          STARTTLS:
            enable: true
            required: true
          ssl:
            enable: true

# Application specific configuration
app:
  storage:
    # Thư mục gốc lưu file upload trên đĩa (tuyệt đối trong Docker, xem Dockerfile/compose).
    root: ${APP_STORAGE_ROOT:./data}
    # Base URL công khai để ghép link đọc (KHÔNG lưu vào DB — DB chỉ lưu relative path).
    public-url: ${APP_STORAGE_PUBLIC_URL:http://localhost:8080}
    url-prefix: /files
  jwt:
    # Base64-encoded 512-bit secret. Override via APP_JWT_SECRET in production.
    secret: ${APP_JWT_SECRET:fJV2+5QqrlNHmoqnaO4FliZ6rdwxbyi4ohpjMeKCKI+OXbe4y6eup8Vj0TaJem/aj8reEfbkK9aWenBdS7xlIg==}
    issuer: vu-gia
    access-token-expiration: 3600000        # 1 hour (ms)
    refresh-token-expiration: 604800000     # 7 days (ms)
  oauth2:
    google:
      # Google OAuth Web client ID (the "aud" every ID token must match).
      # Set GOOGLE_CLIENT_ID in the environment; empty disables the audience check (dev only).
      client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    # "From" address for outgoing mail (EmailService)
    from: ${APP_MAIL_FROM:}
  init:
    # Seed default roles/permissions/admin account on startup
    enabled: true
    admin-username: admin
    admin-email: admin@gmail.com
    admin-password: admin123
  payment:
    # Tài khoản nhận tiền để sinh ảnh VietQR cho đơn thanh toán online (ONL)
    vietqr:
      base-url: ${VIETQR_BASE_URL:https://vietqr.app/img}
      bank: ${VIETQR_BANK:MBBank}
      account: ${VIETQR_ACCOUNT:686804076868}
      holder: ${VIETQR_HOLDER:NGUYEN DUY DAT}
      template: ${VIETQR_TEMPLATE:compact}
  sepay:
    webhook:
      # Secret verify chữ ký X-SePay-Signature (HMAC-SHA256).
      # BẮT BUỘC: rỗng = CHẶN mọi webhook (fail-closed). Phải khớp secret cấu hình bên SePay.
      secret: ${SEPAY_WEBHOOK_SECRET:}

# Actuator: only expose health & info publicly; keep the rest off by default
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Mail (SMTP) is an optional outbound dependency, not something the app needs
    # to be up/ready — an unconfigured or unreachable mail host must not flip the
    # container's liveness/readiness (and Docker HEALTHCHECK) to DOWN.
    mail:
      enabled: false

# SpringDoc / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
