# ============================================================================
# vu-gia — production compose cho Coolify.
# MySQL và MinIO chạy dưới dạng managed resource RIÊNG trên Coolify (không nằm
# trong file này) — set các biến DB_*/MINIO_* dưới đây trỏ tới 2 resource đó.
# Toàn bộ giá trị nhạy cảm PHẢI khai trong tab Environment Variables của Coolify,
# không hardcode trong repo.
# ============================================================================
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # --- Database (MySQL resource riêng trên Coolify) ---
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # --- MinIO / S3 (MinIO resource riêng trên Coolify) ---
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      # URL công khai để build link ảnh trả về client (domain MinIO API, có HTTPS).
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_BUCKET_PRODUCT: ${MINIO_BUCKET_PRODUCT:-products}
      MINIO_BUCKET_ASSET: ${MINIO_BUCKET_ASSET:-assets}

      # --- JWT ---
      APP_JWT_SECRET: ${APP_JWT_SECRET}

      # --- OAuth2 Google (optional) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

      # --- Mail (optional) ---
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}

      # --- VietQR payment ---
      VIETQR_BASE_URL: ${VIETQR_BASE_URL:-https://vietqr.app/img}
      VIETQR_BANK: ${VIETQR_BANK:-MBBank}
      VIETQR_ACCOUNT: ${VIETQR_ACCOUNT}
      VIETQR_HOLDER: ${VIETQR_HOLDER}
      VIETQR_TEMPLATE: ${VIETQR_TEMPLATE:-compact}

      # --- SePay webhook ---
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}

      # --- JVM tuning (container-aware) ---
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseG1GC}

    # Coolify tự gán domain qua biến này (điền ở tab Environment Variables/FQDN
    # trên Coolify UI) và tự route reverse-proxy (Traefik) vào cổng container 8080.
    # Không publish "ports:" trực tiếp ra host — Coolify proxy nói chuyện qua mạng nội bộ.
    expose:
      - "8080"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
