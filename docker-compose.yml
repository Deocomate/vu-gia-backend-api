# ============================================================================
# vu-gia — full stack chạy local bằng 1 lệnh: `docker compose up -d --build`
# App tự chạy Flyway (migrate schema V1 + seed V2) khi khởi động.
# ============================================================================
services:
  mysql:
    image: mysql:8.4
    container_name: vugia-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dev_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: vugia-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API (URL ảnh public)
      - "9001:9001"   # Console UI (đăng nhập upload ảnh)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: vugia-app
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # DB: app nói chuyện với MySQL qua tên service `mysql`
      DB_URL: jdbc:mysql://mysql:3306/dev_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      # MinIO: app upload qua mạng nội bộ container (minio:9000)...
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      # ...nhưng URL ảnh trả cho TRÌNH DUYỆT phải là host công khai (localhost:9000)
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  minio_data:
