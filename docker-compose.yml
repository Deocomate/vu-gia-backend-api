# ============================================================================
# vu-gia — stack tự chứa: MySQL + Spring Boot chạy chung trong 1 `docker compose up`.
# Thay thế bản Coolify managed-resource trước đây. Đặt các biến nhạy cảm trong
# file `.env` cạnh file này (không commit) — xem `.env.example`.
#
# QUAN TRỌNG (Coolify/production): file này KHÔNG publish cổng ra host
# (không có `ports:`), chỉ dùng `expose:` cho mạng nội bộ Docker. Reverse proxy
# của Coolify (Traefik) tự route domain -> cổng `expose` của container. Đây là lý
# do tránh lỗi `Bind for 0.0.0.0:8080 failed: port is already allocated` khi
# redeploy hoặc khi app khác trên cùng server đã giữ cổng 8080/3306.
#
# Cần chạy local (Docker Desktop) và muốn gọi trực tiếp localhost:8080 / :3306?
# Dùng overlay: `docker compose -f docker-compose.yml -f docker-compose.local.yml up --build`
# ============================================================================
services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_vu_gia_fullstack
    volumes:
      - mysql-data:/var/lib/mysql
    # KHÔNG publish `ports: 3306` ở đây: (1) tránh trùng cổng trên server dùng
    # chung, (2) không phơi DB ra Internet ở production. App gọi DB qua tên
    # service `db:3306` trong mạng nội bộ compose, không cần publish ra host.
    # Muốn connect DBeaver lúc dev -> dùng docker-compose.local.yml.
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- Database (service "db" ở trên) ---
      DB_URL: jdbc:mysql://db:3306/db_vu_gia_fullstack?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      # --- Local file storage (xem app.storage.* / application.yaml) ---
      APP_STORAGE_ROOT: /app/data
      # BẮT BUỘC: domain/IP thật trỏ tới server này (không để localhost ở prod,
      # nếu không link ảnh trả về client sẽ không mở được).
      APP_STORAGE_PUBLIC_URL: ${APP_STORAGE_PUBLIC_URL}

      # --- JWT ---
      APP_JWT_SECRET: ${APP_JWT_SECRET}

      # --- OAuth2 Google (optional) ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}

      # --- Mail (optional) ---
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}

      # --- VietQR payment ---
      VIETQR_BASE_URL: ${VIETQR_BASE_URL:-https://vietqr.app/img}
      VIETQR_BANK: ${VIETQR_BANK:-MBBank}
      VIETQR_ACCOUNT: ${VIETQR_ACCOUNT}
      VIETQR_HOLDER: ${VIETQR_HOLDER}
      VIETQR_TEMPLATE: ${VIETQR_TEMPLATE:-compact}

      # --- SePay webhook ---
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}

      # --- JVM tuning (container-aware) ---
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseG1GC}

    # Chỉ `expose` (mạng nội bộ Docker), KHÔNG publish ra host. Coolify/Traefik
    # route domain (vd https://api.gomvugia.vn) -> cổng 8080 container này. Nhờ
    # vậy không đụng cổng host -> hết lỗi "port 8080 already allocated". Muốn gọi
    # trực tiếp localhost:8080 lúc dev -> dùng docker-compose.local.yml.
    expose:
      - "8080"

    # Named volume (KHÔNG bind mount): ownership của mountpoint được kế thừa từ
    # image (đã `chown spring:spring /app` trong Dockerfile) nên user non-root
    # "spring" ghi được ngay. Đổi sang bind mount (vd "./data:/app/data") thường
    # khiến thư mục host thuộc root/khác UID -> mọi upload lỗi 500 lúc runtime,
    # không fail lúc boot -> rất khó chẩn đoán. Nếu buộc phải bind mount, chạy
    # trước: `sudo chown -R 1000:1000 ./data` (hoặc đúng UID image dùng cho "spring").
    volumes:
      - upload-data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      # 90s: lần boot đầu tiên (DB rỗng) Flyway chạy V1->V5 gồm seed lớn
      # (700+ dòng INSERT) trước khi Actuator lên UP; 40s dễ báo unhealthy sớm.
      start_period: 90s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

volumes:
  mysql-data:
  upload-data:
